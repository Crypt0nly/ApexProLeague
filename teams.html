<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams — Apex Pro League</title>
  <meta name="description" content="The sixteen clubs competing in Apex Pro League Season I, drawn into four groups." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="teams">

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="kicker">Season I</span>
        <h1>The <span class="text-gold">Sixteen</span></h1>
        <p>Four groups. Sixteen clubs from across Europe. Only eight survive the group stage.</p>
        <div id="teamsNotice"></div>
      </div>
    </section>

    <section class="section--tight section">
      <div class="container" id="teamsRoot"></div>
    </section>

    <section class="section--tight">
      <div class="container">
        <div class="discord-panel reveal">
          <h2>Think your club belongs here?</h2>
          <p>Registration for the next season opens on Discord. Get verified early and secure your place in the draw.</p>
          <a class="btn btn--gold" href="#" data-discord>Register on Discord</a>
        </div>
      </div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
